        commerce/content:
          [blog, video, section, faq, testimonial, banner, reference]
        commerce/marketing: [referral, popup, promotion]

    - id: 3
      title: "Faz 3 – Üretim ve Operasyon Dijitalleşmesi"
      goal: >
        Üretim planlama, görev yönetimi, zamanlama, kargo takibi ve
        Etsy entegrasyonuyla operasyon süreçlerinin dijitalleştirilmesi.
      modules:
        automation/operations:
          [production, task, checklist, workflow, schedule, calendar, reminder]
        automation/shipping: [yurtici]
        automation/marketplace: [etsy]

    - id: 4
      title: "Faz 4 – Müşteri Etkileşimi ve İletişim Katmanı"
      goal: >
        Satış sonrası süreçlerin takibi, çok kanallı mesajlaşma entegrasyonları
        ve müşteri etkileşim raporlarıyla CRM altyapısının kurulması.
      modules:
        automation/engagement:
          [
            crm,
            ticket,
            follow-up,
            insight,
            message,
            whatsapp,
            messenger,
            instagram,
            sms,
          ]

    - id: 5
      title: "Faz 5 – Finansal Süreçler ve Muhasebe Entegrasyonu"
      goal: >
        Fatura, gider, kasa, banka yönetimi ve Mikro, Logo, Parasut gibi sistemlerle muhasebe entegrasyonlarının sağlanması.
      modules:
        automation/finance:
          [
            billing,
            expense,
            cash,
            bank,
            accounting,
            e-invoice,
            mikro,
            logo,
            parasut,
          ]

    - id: 6
      title: "Faz 6 – Pazaryeri ve Kargo Entegrasyonları"
      goal: >
        Amazon gibi yeni pazaryerlerine açılım ve çoklu taşıyıcı destekli gelişmiş kargo altyapısının kurulumu.
      modules:
        automation/marketplace: [amazon]
        automation/shipping: [aras, ship-integrator]

    - id: 7
      title: "Faz 7 – SaaS Dönüşümü ve Çoklu Müşteri Altyapısı"
      goal: >
        TT Panel’in çok şirketli, özelleştirilebilir ve kiralanabilir
        bir SaaS ürününe dönüşmesini sağlayacak altyapının kurulması.
      modules:
        system/saas:
          [
            tenant,
            domain-mapping,
            plan-management,
            subscription,
            invitation,
            billing-usage,
          ]

  closing_note: >
    Tüm fazlar, tamamlandığında test edilebilir ve versiyonlanabilir sistemler üretmelidir.
    GPT yalnızca bu yol haritasında tanımlı faz ve sprintler içinde üretim yapabilir.
  maintenance:
    versioning: >
      Her faz, tamamlandığında yeni bir major sürüm olarak etiketlenir (örn: v1.0.0 → Faz 1).
      Sürüm etiketleri yalnızca kullanılabilirlik seviyesine göre belirlenir; dosya ya da modül sayısına göre değil.

    updates: >
      Yol haritası, yayınlanmamış fazlar için güncellenebilir.
      Güncellemeler GPT önerisi, ekip kararı veya saha ihtiyaçları doğrultusunda yapılır.
      Her güncellemede `updated_at` alanı yenilenir.

    review: >
      Sprint sonunda roadmap gözden geçirilir, gerekiyorsa yeniden yazılır.
      Ay sonlarında yapılacak gözden geçirme toplantıları ile roadmap’in bütünlüğü korunur.

workspace:
  title: "TT Panel Proje Ortamı"
  description: >
    "TT Panel Proje Ortamı, projenin geliştirme süreçlerinin yürütüleceği dijital çalışma alanıdır.
    Bu alan, ekip üyelerinin işbirliği yaparak projeyi daha verimli bir şekilde geliştirmelerine olanak tanır."
  path: "/Volumes/Workspace/devroot/projects/ttpanel"
  directories:
    apps:
      description: "TT Panel uygulama dizini. API, Admin ve Shop uygulamaları içerir."
      directories:
        api: "NestJS ile geliştirilmiş REST API uygulamasıdır."
        admin: "Nuxt 3 tabanlı yönetici panelidir (SSG + SSR destekli)."
        shop: "Son kullanıcıya açık e-ticaret arayüzüdür."
        mobile: "Opsiyonel olarak Flutter veya Expo tabanlı mobil istemcidir. Gelecek sürümlerde aktif edilecek."
    modules:
      description: "TT Panel modülleri. E-ticaret ve Otomasyon süreçlerini kapsayan modüllerdir."
      directories:
        system: "Yetkilendirme, ayarlar, bildirimler gibi çekirdek sistem bileşenleri."
        commerce: "Ürün kataloğu, sipariş yönetimi, müşteri ilişkileri, pazarlama, içerik sunumu ve raporlama burada bütünleşik olarak çalışır."
        automation: "Tüm operasyonel süreçler, mesajlaşma, finansal işlemler ve entegrasyonlar bu grupta yer alır."
    services:
      description: "Projenin dış bağımlılıklarını (database, cache, mail, storage vb.) içeren servis yapılandırmaları bu klasörde yer alır. Her klasör, genellikle bir Docker konteynerine karşılık gelir ve `docker-compose.yml` ile entegre çalışır."
      directories:
        postgres: "PostgreSQL veritabanı servisi ile ilgili init dosyaları"
        redis: "Redis sunucusu (BullMQ kuyruk sistemiyle birlikte kullanılır)"
        mailpit: "Geliştirme ortamı için SMTP test ve mail önizleme servisi"
        minio: "S3 uyumlu dosya depolama sunucusu"
        worker: "Kuyruk işleyicisi (Redis + BullMQ üzerinden arka plan görevleri)"
    packages:
      description: "Bu klasör, frontend ve backend uygulamaları arasında ortak kullanılan yapıların merkezi olarak tutulduğu yerdir. Her alt klasör kendi içinde bağımsız bir paket gibi yapılandırılır ve diğer uygulamalarda import edilerek kullanılır."
      directories:
        ui: "Vue/Nuxt bileşenleri (buton, form elemanları, layout’lar, temalar vb.)"
        tsconfig: "Ortak TypeScript yapılandırması"
        eslint-config: "Kod kalite kurallarının merkezi yönetimi"
    config:
      description: "Projenin çalışma ortamlarına, servis tanımlarına ve sistem ayarlarına dair tüm konfigürasyon dosyaları bu klasörde toplanır. Koddan bağımsız tutularak ortam geçişlerini kolaylaştırır ve altyapı kontrolünü merkezileştirir."
      directories:
        docker: "Her servis için Dockerfile ve yapılandırma betikleri"
        env: "Uygulamalara özel `.env.example` dosyaları (admin, api, shop...)"
        ssl: "Yerel geliştirme için kendi imzalanmış SSL sertifikaları (opsiyonel)"
        system: "Sabit JSON/YAML sistem konfigürasyonları (örnek: ülkeler, para birimleri, ayarlar)"
        ci: "Gelecekte CI/CD senaryoları için yer ayrılmıştır"
    tests:
      description: "Projedeki test senaryoları modüllerden bağımsız olarak bu klasörde organize edilir. Amaç, testlerin ayrı katmanlarda tutulması ve test stratejilerinin daha net uygulanabilmesidir."
      directories:
        unit: "Birim testleri (her modülün servis, helper veya mantıksal parçaları için)"
        integration: "Modüller arası veri ve iş akışı testleri"
        e2e: "Uygulama düzeyinde uçtan uca testler (Cypress, Playwright, vs.)"
    scripts: "Otomasyon komutları, kurulum ve bakım betikleri"
    docs:
      description: "Bu klasör, hem geliştirici belgelerini hem de GPT destekli üretim sistemini içerir. Kod barındırmaz; ancak tüm mimari kararlar, faz planları, modül şemaları ve proje hafızası burada tutulur. Belgeler, kullanım amacına göre alt klasörlerde organize edilmiştir:"
      directories:
        manual: "Panel, modül, servis gibi sistem bölümlerine dair geliştirici belgeleri"
        dev: "Ortam kurulumu, yerel geliştirme ve CLI komutlarına dair açıklamalar"
        gpt: "GPT'nin üretim sürecine katıldığı tüm kontrol dosyaları ve içerikler"
  configurations:
    docker-compose:
      description: "TT Panel uygulaması için Docker Compose yapılandırması. Traefik reverse proxy, PostgreSQL veritabanı, Redis cache, MinIO nesne depolama, Mailpit SMTP sunucusu ve TT Panel API, Admin ve Shop servislerini içerir."
      files:
        traefik:
          path: /Volumes/Workspace/devroot/services/traefik/docker-compose.yaml
          description: "Tüm projeler tarafından paylaşılan, merkezi yönlendirme (reverse proxy) servisini tanımlar."
          content:
            networks:
              traefik:
                name: traefik
                driver: bridge
            services:
              traefik:
                image: traefik:v3.4.3
                container_name: traefik
                restart: unless-stopped
                command:
                  - --entrypoints.web.address=:80
                  - --api.dashboard=true
                  - --providers.docker=true
                  - --providers.docker.exposedbydefault=false
                ports:
                  - "80:80"
                volumes:
                  - /var/run/docker.sock:/var/run/docker.sock:ro
                  - ./traefik.yml:/etc/traefik/traefik.yml:ro
                labels:
                  - "traefik.enable=true"
                  - "traefik.http.routers.traefik.rule=Host(`traefik.ttpanel.test`)"
                  - "traefik.http.routers.traefik.entrypoints=web"
                  - "traefik.http.routers.traefik.service=api@internal"
                networks:
                  - traefik
        ttpanel:
          path: /Volumes/Workspace/devroot/projects/ttpanel/docker-compose.yaml
          description: "TT Panel uygulamasına ait servisleri (API, Admin, Shop, PostgreSQL, Redis, MinIO, Mailpit) tanımlar. Geliştirme ortamında projenin temel bileşenlerini çalıştırmak için kullanılır."
          notes:
            postgres: "PostgreSQL veritabanı servisi. Veritabanı verilerini kalıcı hale getirmek için volume kullanır."
            pgweb: "PostgreSQL veritabanı yönetim aracı. Web tabanlı arayüz sağlar."
            redis: "Redis cache servisi. Veritabanı önbellekleme için kullanılır."
            minio: "MinIO nesne depolama servisi. Dosya depolama için kullanılır."
            mailpit: "Mailpit SMTP sunucusu. E-posta testleri için kullanılır."
            api: "NestJS tabanlı API servisidir. Postgres ve Redis'e bağımlıdır."
            admin: "NuxtJS tabanlı yönetim paneli servisidir. API servisine bağımlıdır."
            shop: "NuxtJS tabanlı halka açık e-ticaret arayüzü servisidir. API servisine bağımlıdır."
          content:
            networks:
              traefik:
                external: true
              ttpanel:
                name: ttpanel
                driver: bridge
            services:
              postgres:
                container_name: ttpanel-postgres
                image: postgres:16
                restart: unless-stopped
                env_file:
                  - ./config/env/.env.postgres
                volumes:
                  - ./services/postgres/data:/var/lib/postgresql/data
                networks:
                  - ttpanel

              pgweb:
                container_name: ttpanel-pgweb
                image: sosedoff/pgweb:latest
                restart: on-failure
                environment:
                  - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ttpanel?sslmode=disable
                ports:
                  - "8081:8081"
                networks:
                  - traefik
                  - ttpanel
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.pgweb.rule=Host(`pgweb.ttpanel.test`)
                  - traefik.http.services.pgweb.loadbalancer.server.port=8081

              redis:
                container_name: ttpanel-redis
                image: redis:7
                restart: on-failure
                command: redis-server --requirepass redis
                env_file:
                  - ./config/env/.env.redis
                volumes:
                  - ./services/redis/data:/data
                networks:
                  - ttpanel

              minio:
                container_name: ttpanel-minio
                image: minio/minio:latest
                restart: on-failure
                env_file:
                  - ./config/env/.env.minio
                command: server /data
                volumes:
                  - ./services/minio/data:/data
                networks:
                  - traefik
                  - ttpanel
                ports:
                  - "9000:9000"
                  - "9001:9001"
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.minio.rule=Host(`minio.ttpanel.test`)
                  - traefik.http.services.minio.loadbalancer.server.port=9001

              mailpit:
                container_name: ttpanel-mailpit
                image: axllent/mailpit:latest
                restart: on-failure
                env_file:
                  - ./config/env/.env.mailpit
                ports:
                  - "8025:8025"
                networks:
                  - traefik
                  - ttpanel
                expose:
                  - "8025"
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.mailpit.rule=Host(`mailpit.ttpanel.test`)
                  - traefik.http.services.mailpit.loadbalancer.server.port=8025

              api:
                container_name: ttpanel-api
                build:
                  context: ./apps/api
                  dockerfile: ../../config/docker/api/Dockerfile
                restart: on-failure
                env_file:
                  - ./config/env/.env.api
                volumes:
                  - ./apps/api:/app
                networks:
                  - traefik
                  - ttpanel
                depends_on:
                  - postgres
                  - redis
                expose:
                  - "3000"
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.api.rule=Host(`api.ttpanel.test`)
                  - traefik.http.services.api.loadbalancer.server.port=3000
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3

              admin:
                container_name: ttpanel-admin
                build:
                  context: ./apps/admin
                  dockerfile: ../../config/docker/admin/Dockerfile
                restart: on-failure
                env_file:
                  - ./config/env/.env.admin
                volumes:
                  - ./apps/admin:/app
                networks:
                  - traefik
                  - ttpanel
                expose:
                  - "3001"
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.admin.rule=Host(`admin.ttpanel.test`)
                  - traefik.http.services.admin.loadbalancer.server.port=3001
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:3000/"]
                  interval: 30s
                  timeout: 10s
                  retries: 3

              shop:
                container_name: ttpanel-shop
                build:
                  context: ./apps/shop
                  dockerfile: ../../config/docker/shop/Dockerfile
                restart: on-failure
                env_file:
                  - ./config/env/.env.shop
                volumes:
                  - ./apps/shop:/app
                networks:
                  - traefik
                  - ttpanel
                expose:
                  - "3002"
                labels:
                  - traefik.enable=true
                  - traefik.http.routers.shop.rule=Host(`shop.ttpanel.test`)
                  - traefik.http.services.shop.loadbalancer.server.port=3002
                healthcheck:
                  test: ["CMD", "curl", "-f", "http://localhost:3000/"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
    env:
      description: "TT Panel uygulamasına ait her servis için ortam değişkenlerini (.env.*) içeren yapılandırma dosyaları. Geliştirme, test ve üretim gibi farklı ortamlar için özelleştirilebilir."
      files:
        postgres:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.postgres
          description: "PostgreSQL veritabanı için gerekli çevresel değişkenler."
          content:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: ttpanel
            TZ: Europe/Istanbul
            POSTGRES_PORT: 5432
        redis:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.redis
          description: "Redis servisi için gerekli çevresel değişkenler."
          content:
            REDIS_PASSWORD: redis
        minio:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.minio
          description: "MinIO nesne depolama servisi için gerekli çevresel değişkenler."
          content:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        mailpit:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.mailpit
          description: "Mailpit SMTP sunucusu için gerekli çevresel değişkenler."
          content:
            MAILPIT_SMTP_PORT: 1025
            MAILPIT_HTTP_PORT: 8025
        api:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.api
          description: "TT Panel API servisi için gerekli çevresel değişkenler."
          content:
            NODE_ENV: development
            APP_NAME: ttpanel-api
            APP_PORT: 3000
            TZ: Europe/Istanbul
            DEFAULT_LANGUAGE: tr
            JWT_SECRET: supersecretkey
            JWT_EXPIRES_IN: 900s
            JWT_REFRESH_EXPIRES_IN: 7d
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ttpanel?schema=public
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: redis
            SMTP_HOST: mailpit
            SMTP_PORT: 1025
            SMTP_USER: ""
            SMTP_PASS: ""
        api_test:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.api.test
          description: "TT Panel API servisinin test ortamı yapılandırması. Test veritabanı ve kısa JWT süreleri içerir."
          content:
            NODE_ENV: test
            APP_NAME: ttpanel-api-test
            APP_PORT: 3100
            TZ: Europe/Istanbul
            DEFAULT_LANGUAGE: tr
            JWT_SECRET: test-secret
            JWT_EXPIRES_IN: 60s
            JWT_REFRESH_EXPIRES_IN: 1h
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ttpanel_test?schema=public
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: redis
            SMTP_HOST: mailpit
            SMTP_PORT: 1025
            SMTP_USER: ""
            SMTP_PASS: ""
        api_prod:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.api.prod
          description: "TT Panel API servisinin production ortamı yapılandırması. Güvenlik odaklı, dıştan set edilen değişkenlerle hazırlanmıştır."
          content:
            NODE_ENV: production
            APP_NAME: ttpanel-api
            APP_PORT: 3000
            TZ: Europe/Istanbul
            DEFAULT_LANGUAGE: tr
            JWT_SECRET: ${PROD_JWT_SECRET}
            JWT_EXPIRES_IN: 3600s
            JWT_REFRESH_EXPIRES_IN: 7d
            DATABASE_URL: postgresql://${PROD_DB_USER}:${PROD_DB_PASS}@prod-db-server:5432/ttpanel?schema=public
            REDIS_HOST: prod-redis
            REDIS_PORT: 6379
            REDIS_PASSWORD: ${PROD_REDIS_PASSWORD}
            SMTP_HOST: smtp.sendgrid.net
            SMTP_PORT: 587
            SMTP_USER: apikey
            SMTP_PASS: ${SENDGRID_API_KEY}
        admin:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.admin
          description: "TT Panel Admin arayüzü için gerekli çevresel değişkenler."
          content:
            NODE_ENV: development
            NITRO_PORT: 3001
            NITRO_HOST: 0.0.0.0
            APP_NAME: ttpanel-admin
            TZ: Europe/Istanbul
            DEFAULT_LANGUAGE: tr
            API_BASE_URL: http://api.ttpanel.test
            GA_ID: ""
            FB_PIXEL_ID: ""
        shop:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/env/.env.shop
          description: "TT Panel Shop arayüzü için gerekli çevresel değişkenler."
          content:
            NODE_ENV: development
            NITRO_PORT: 3002
            NITRO_HOST: 0.0.0.0
            APP_NAME: ttpanel-shop
            TZ: Europe/Istanbul
            DEFAULT_LANGUAGE: tr
            API_BASE_URL: http://api.ttpanel.test
            GA_ID: ""
            FB_PIXEL_ID: ""
    dockerfiles:
      description: "TT Panel uygulaması için Dockerfile yapılandırmaları. Her servis için ayrı Dockerfile'lar içerir."
      files:
        api:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/docker/api/Dockerfile
          description: "TT Panel API servisi için Dockerfile. Node.js tabanlı uygulama için gerekli bağımlılıkları yükler ve uygulamayı başlatır."
          content: |
            # Temel imaj
            FROM node:22

            # Zaman dilimi ayarı için ortam
            ENV TZ=Europe/Istanbul
            # Çalışma klasörü
            WORKDIR /app
            # Paket dosyalarını yükle
            COPY package*.json ./
            RUN npm install
            # Tüm proje dosyalarını kopyala
            COPY . .
            # Portu aç
            EXPOSE 3000
            # Uygulama başlat
            CMD ["npm", "run", "start:dev"]
        admin:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/docker/admin/Dockerfile
          description: "TT Panel Admin arayüzü için Dockerfile. Node.js tabanlı uygulama için gerekli bağımlılıkları yükler ve uygulamayı başlatır."
          content: |
            FROM node:22
            WORKDIR /app
            ENV TZ=Europe/Istanbul
            COPY package*.json ./
            RUN npm install
            COPY . .
            EXPOSE 3001
            CMD ["npm", "run", "dev"]
        shop:
          path: /Volumes/Workspace/devroot/projects/ttpanel/config/docker/shop/Dockerfile
          description: "TT Panel Shop arayüzü için Dockerfile. Node.js tabanlı uygulama için gerekli bağımlılıkları yükler ve uygulamayı başlatır."
          content: |
            FROM node:22
            WORKDIR /app
            ENV TZ=Europe/Istanbul
            COPY package*.json ./
            RUN npm install
            COPY . .
            EXPOSE 3002
            CMD ["npm", "run", "dev"]
    makefile:
      path: "/Volumes/Workspace/devroot/projects/ttpanel/makefile"
      description: "TT Panel uygulaması için Makefile komutları. Docker Compose ile servisleri başlatma, durdurma, logları izleme ve veritabanı işlemleri gibi görevleri içerir."
      content: |
        .PHONY: help up down restart logs clean psql test migrate seed traefik
        .DEFAULT_GOAL := help

        # Proje adı
        PROJECT_NAME=ttpanel

        # Ortam ve path
        ENV_FILE ?= .env
        ENV_PATH=config/env
        ENV_API=$(ENV_PATH)/.env.api
        TRAEFIK_PATH=../../services/traefik

        # Compose komutu
        DC=docker compose

        ## 🔄 Traefik servisi kontrol + başlat
        traefik:
          @if ! docker ps --format '{{.Names}}' | grep -q '^traefik$$'; then \
            echo "🔁 Traefik servisi başlatılıyor..."; \
            cd $(TRAEFIK_PATH) && $(DC) up -d; \
          else \
            echo "✅ Traefik servisi zaten çalışıyor."; \
          fi

        ## ⬆️ Projeyi başlat (Traefik + Uygulamalar)
        up: traefik
          @$(DC) up -d

        ## 🔻 Uygulamayı durdur
        down:
          @$(DC) down

        ## 🔁 Yeniden başlat
        restart:
          @$(MAKE) down
          @$(MAKE) up

        ## 🔍 Logları izle
        logs:
          @$(DC) logs -f --tail=100

        ## 🧼 Volume + ağ temizliği
        clean:
          @$(DC) down -v --remove-orphans
          @docker volume prune -f
          @docker network prune -f

        ## 🐘 PostgreSQL'e bağlan
        psql:
          @$(DC) exec postgres psql -U postgres -d ttpanel

        ## 🧪 API test çalıştır
        test:
          @$(DC) exec api npm run test

        ## 🔄 Prisma migrate (Docker içinden, doğru schema yoluyla)
        migrate:
          docker compose exec api env $(shell grep -v '^#' $(ENV_API) | xargs) npx prisma migrate dev --name init --schema=prisma/schema.prisma

        ## 🌱 Prisma seed (Docker içinden, doğru schema yoluyla)
        seed:
          docker compose exec api env $(shell grep -v '^#' $(ENV_API) | xargs) npx prisma db seed --schema=prisma/schema.prisma

        ## 🔍 Ortam değişkeni kontrolü
        env-check:
          @echo "🔎 Aktif .env dosyası içeriği:"
          @cat $(ENV_API)

        ## 👋 Yardım menüsü
        help:
          @echo ""
          @echo "TT Panel Makefile Komutları:"
          @echo "────────────────────────────────────────"
          @echo " make up         → Traefik + TT Panel uygulamalarını başlat"
          @echo " make down       → Uygulamaları durdur"
          @echo " make restart    → Durdur + yeniden başlat"
          @echo " make logs       → Logları izle"
          @echo " make clean      → Volume + ağ temizliği"
          @echo " make psql       → PostgreSQL terminali"
          @echo " make migrate    → Prisma migration çalıştır (.env.api ile)"
          @echo " make seed       → Prisma seed çalıştır (.env.api ile)"
          @echo " make test       → API testlerini çalıştır"
          @echo " make env-check  → .env.api içeriğini göster (kontrol amaçlı)"
          @echo ""

