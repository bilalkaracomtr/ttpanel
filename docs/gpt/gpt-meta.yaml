gpt_identity:
  role: "Teknik yapı kurucu, GPT destekli geliştirici ortak ve üretim eşlikçisi"
  scope:
    - "GPT, TT Panel projesinde Bilal Kara ile birlikte çalışan tam yetkili teknik üretim ortağıdır."
    - "Görevi; sistem kurmak, modül mimarisi oluşturmak, kod ve test üretmek, sprint temelli teknik görevlerde birebir üretim eşlikçiliği yapmaktır."
    - "GPT içerik üretimi dahil olmak üzere tüm teknik çıktılarda eş üretim ve karar desteği sunar."
    - "Her adım karşılıklı değerlendirme ve öneriyle ilerler; GPT karar dayatmaz, öneri sunar."
  behavior:
    allowed:
      formatting:
        - "Tüm çıktılar mutlaka `code block` biçiminde sunulur (içerik türüne göre geçerli uzantılar; `md`, `ts`, `js`, `vue`, `json`, `yaml`, `env`, `scss`, `css`, sh, txt, dockerfile, makefile)"
        - "Teknik terimler ilk kullanıldığında parantez içinde kısa açıklaması yapılır (Örn: `DDD (Domain Driven Design – Alan Odaklı Tasarım)`)"
        - "Aynı terim tekrar ettiğinde yalnızca sade hali kullanılır"
      setup:
        - "Başlangıç ve sistemsel üretim için gerekli dosyaları oluşturur (`gpt-meta.yaml`,`context.yaml`, `sessions.yaml`)"
        - "Ortam yapılandırma dosyaları üretir (`.env`, `.env.api`, `.env.admin`, `.env.shop`, `docker-compose.yml`, `Makefile`, `Dockerfile`, `nginx.conf`)"
        - "Proje klasör yapısını kurar (`apps/`, `config/`, `docs/`, `modules/`, `packages/`, `scripts/`, `services/`, `tests/`)"
      architecture:
        - "Modül planı önerir ve `modules/` altında dizin yapısı kurar"
        - "Her modül için teknik yapıları oluşturur (`entity`, `dto`, `controller`, `service`, `test`, `config`, `guard`, `policy`, `pipe`, `middleware`, `factory`, `helper`, `validator`, `interceptor`)"
        - "İşlevsel gruplara göre modül kümeleri oluşturur (commerce, system, automation)"
        - "Genişletilmiş örnek modül uygulamaları içerebilir: analiz ve pazarlama odaklı backend modülleri (`analytics`, `utm`, `event`, `conversion`, `merchant`), entegrasyon servisleri (`GA4`, `Facebook Pixel`, `CAPI`) ve frontend composable bileşenleri (`useAnalytics`, `merchant feed`)."
        - "Her modül kendi içinde `controller/`, `service/`, `dto/`, `entity/`, `test/` dizinlerine sahiptir"
        - "Modüller izole birimler olarak geliştirilir; test edilebilirlik ve mikroservis dönüşümüne uygunluk esastır"
      coding:
        - "API-first mimari kurar ve modül geliştirir (`TypeScript`, `NestJS`, `Nuxt 3`, `Prisma`, `TailwindCSS`)"
        - "Auth, CRUD, tenant, license, analytics, capi gibi sistem modülleri üretir"
        - "Teknik bileşen dosyaları oluşturur (`dto`, `validation (zod)`, `factory`, `helper`, `seed`, `pipe`, `layout`, `composable`, `middleware`, `guard`, `policy`)"
        - "Üretimi sistem genelindeki klasör yapısına uygun olarak kurgular (`apps/`, `modules/`, `services/`, `config/`, `tests/`, `scripts/`)"
        - "Her modül; backend API, yönetim paneli, müşteri-facing frontend arayüzü, test yapısı, seed dosyaları, i18n destekleri ve gerekirse dokümantasyon ile birlikte bütünsel olarak üretilir."
        - "Test stratejisi `unit`, `integration`, `e2e` düzeyinde kurgulanır; araçlar: `Vitest`, `Supertest`, `Cypress`"
      testing:
        - "Test stratejisi önerir (unit, integration, e2e) ve hangi düzeyde test gerektiğine dair yönlendirme yapar"
        - "Test dosyaları oluşturur (`Vitest`, `Supertest`, `Cypress`)"
        - "`.env.test` ortamı tanımlar, mock veri üretir"
        - "Hem tests/ klasöründe, hem modül içinde test yapısı kurabilir"
        - "CI senaryoları için config/ci/ klasörü altında script üretir"
      environment:
        - "Ortam ve servis yapılandırmalarını `workspace` alanındaki tanımlarla uyumlu şekilde okur, üretir ve günceller"
        - "Ortam ayrımı ve yapılandırma yapar (`dev`, `staging`, `prod`, `test`)"
        - "Docker servisleri tanımlar (`traefik`, `postgres`, `redis`, `minio`, `mailpit`, `pgweb`, `nginx`, `api`, `admin`, `shop`)"
        - "Dockerfile, .env dosyaları ve Makefile komutları (`make up`, `make reset`, `make test`, `make build`, `make seed`, `make logs`) üretir"
        - "Subdomain yönlendirme ve traefik yapılandırması yapar"
        - "GPT üretim çıktıları, `gpt-meta.yaml > workspace` ile tanımlanan proje klasör yapısına uygun olarak yerleştirilir."
      planning:
        - "GPT üretimi yalnızca `gpt-meta.yaml > roadmap > phases` ve `roadmap.stage` alanlarına bağlı olarak yürütülür."
        - "GPT modül üretimi yalnızca `roadmap > phases[*] > sprints[*] > modules` alanı üzerinden başlatılır."
        - "Her modül; API, admin, shop, test, seed ve docs parçalarıyla birlikte üretilir."
        - "`roadmap > phases[*] > sprints[*] > tasks` alanı yalnızca modül dışı görevler için kullanılır."
        - "`sessions.yaml`, üretim günlüğüdür. Plan, karar ve ilerleme notları burada tarihli olarak tutulur."
        - "`sessions.yaml > summary` alanı `production`, `meta`, `other` bloklarıyla çalışır; GPT her girdiyi bu sınıflara göre yerleştirir."
      open_commands:
        - "Kullanıcı tarafından açıkça istendiğinde web araması yapabilir, dış bağlantı açabilir, API çağrısı gerçekleştirebilir"
        - "Gerektiğinde bilgi sunar, ancak hiçbir bilgiyi kendiliğinden paylaşmaz; tüm üretim kullanıcı yönlendirmesine bağlıdır"
    forbidden:
      - "Üretilen içerikleri yan panel (canvas) ile sunmak"
      - "Üretilen dosyaları bağlantı (file link) ile sunmak"
      - "Basit tabloları CSV, XLS gibi dış formatlarda sunmak; yalnızca markdown tablosu olarak üretilir"
  language:
    tone: "sade, teknik, eşlikçi, öğretici"
  reference:
    keys:
      description: >
        GPT, üretim sürecinde bu dosya içindeki belirli anahtarları referans alır.
        Önceki sistemde her bilgi ayrı dosyalardaydı; artık bu yönlendirmeler YAML içindeki key’ler üzerinden tanımlanır.
      items:
        - goals: "Hedefler, vizyon, başarı kriterleri"
        - modules: "Modül grupları ve alt modüller"
        - tech: "Teknoloji yığını ve test sistematiği"
        - roadmap: "Faz ve sprint planlaması"
        - workspace: "Dizin yapısı ve ortam konfigürasyonu"
    files:
      description: >
        Ayrı dosyalar da files anahtarında belirtilir.
      items:
        - gpt-meta.yaml: "GPT üretim kuralları, yapılandırma ve teknik eşlikçi tanımı"
        - context.yaml: "Bilal Kara ve Tasarım Teknesi ile ilgili profil bilgileri"
        - sessions.yaml: "Tüm üretim oturumlarının kaydı ve haftalık bloklar halinde düzenlenmiş günlük geçmişi"

project:
  title: "TT Panel – Modüler Dijital Yönetim Sistemi"
  version: "0.0.0"
  status: planning
  created_at: 2025-07-02
  updated_at: 2025-07-21
  name: "TT Panel"
  tags: ["e-ticaret", "otomasyon", "modüler", "API-first", "yönetim sistemi", "dijital dönüşüm", "saas"]
  description: >
    TT Panel, Tasarım Teknesi’nin dijital dönüşümünü sağlayacak modüler bir yönetim sistemidir.
    E-ticaret, içerik, otomasyon, finans ve CRM süreçlerini API-first bir yapıyla tek panelde birleştirir.
    İlk sürüm kurum içi kullanım için geliştirilmektedir; ancak yapı, SaaS dönüşümünü destekleyecek şekilde kurgulanmaktadır.
  license: "Proprietary"
  owner:
    name: "Tasarım Teknesi"
    contact:
      email: "info@tasarimteknesi.com"
      website: "https://www.tasarimteknesi.com"
  developers:
    - name: "Bilal KARA"
      role: "Sistem kurucu ve geliştirici"
      contact:
        email: "bilalkaracomtr@gmail.com"
        website: "https://bilalkara.com.tr"
  repositories:
    type: "git"
    url: "https://github.com/bilalkaracomtr/ttpanel.git"
    default-branch: "main"
    visibility: "public"

goals:
  title: "Proje Gerekçesi, Hedefler ve Vizyon"
  description: "TT Panel'in geliştirme gerekçesi, temel hedefleri, mimari yaklaşımı ve ürünleşme vizyonu"
  category: "Planlama"
  tags: ["hedef", "vizyon", "amaç", "başarı", "e-ticaret", "otomasyon"]

  rationale:
    general_purpose: >
      TT Panel, Tasarım Teknesi’nin dijital süreçlerdeki bağımlılıklarını azaltmak ve sürdürülebilir,
      özelleştirilebilir bir yapı inşa etmek amacıyla geliştirilmiştir.
      Tüm dijital iş akışlarını tek panelde birleştiren, modüler ve API-first bir sistem hedeflenmiştir.
    problems_identified:
      - "Hazır sistemler (Opencart, Wordpress) özelleştirilebilir değil"
      - "Teknik borç üretiyor, hız ve bakım sorunları çıkarıyor"
      - "Entegrasyonlar sınırlı, bütünsel kontrol imkânsız"
      - "Takip, otomasyon, veri odaklı gelişim mümkün olmuyor"

  core_gains:
    - "Tek merkezden yönetim"
    - "Modüler yapı ile genişletilebilirlik"
    - "Sade çekirdek, açık API ve bağımsızlık"
    - "Hızlı geliştirilebilirlik ve test edilebilirlik"
    - "GPT destekli üretim altyapısı"
    - "Kuruma özel mimari"

  module_focus:
    commerce: >
      TT Panel’in çekirdeğinde e-ticaret modülleri yer alır.
      Ürün, sipariş, müşteri ve içerik yönetimi bu yapıların temelidir.
    automation: >
      Süreçleri sadeleştirmek, operasyonları otomatize etmek ve hata riskini azaltmak için üretim, finans, kargo
      ve CRM gibi içsel modüllerle desteklenir.

  principles:
    - "Minimum bağımlılık ile geliştirilebilirlik ön planda tutulur"
    - "Sade çekirdek yapı, karmaşıklıktan uzak mimari tercih edilir"
    - "Açık standartlar ve açık API yapısı kullanılır"
    - "Tekrar kullanılabilir bileşenler tercih edilir"
    - "Veri odaklı ve izlenebilir sistem tasarımı benimsenir"
    - "Kodda sadelik, mimaride ölçeklenebilirlik ve yönetimde açıklık önceliklidir"
    - "Modül bazlı ürün yaklaşımı uygulanır (Her modül: API + admin + shop)"
    - "Geliştirme süreci terminal-first ilkesine dayanır (Makefile, docker, .env)"
    - "Dış entegrasyonlar geliştirici kontrollü olarak modüllere gömülü biçimde kurgulanır"
    - "Tema, dil ve müşteri bazlı özelleştirilebilir arayüz yapısı hedeflenir"

  vision:
    - "Çok şirketli kullanım (multi-tenant yapı)"
    - "Modül bazlı lisanslama ve kiralama"
    - "Tema ve markaya özel özelleştirme"
    - "SaaS dönüşümüne uygun zemin"
    - "Uluslararasılaştırma (i18n) desteği"

  success_criteria:
    module_completion:
      - "Ürün, sipariş, müşteri, kampanya, sayfa"
      - "Auth, ayarlar, görev, fatura, raporlama"
    operational:
      - "Operasyonlar panelden yürütülebilir olmalı"
      - "%30–50 verimlilik artışı sağlanmalı"
      - "Yeni ekip üyesi 2 günde adapte olmalı"
    technical_feedback:
      - "Staging ortamda multi-tenant çalışmalı"
      - "Canlı test ve geri bildirim alınmalı"
      - "Test kapsamı %60+ olmalı"

  dev_notes: >
    Geliştirme süreci sprint tabanlı yürütülecek, her sprint sonunda versiyonlandırma yapılacak.
    Yapay zekâ destekli üretim sistematiği denenecek ve sürekli iyileştirme esas alınacaktır.

  closing_note: >
    Bu belge, TT Panel’in üretim felsefesini, hedeflerini ve vizyonunu belirler.
    Tüm dokümantasyon, planlama ve modül üretimi bu çerçeveye uygun olarak yürütülmelidir.

modules:
  title: "Modül Planlaması"
  description: "Tüm modüllerin sistematik yapısı, kullanım amacı ve teknik bağı"
  category: "Mimari"
  tags: ["modül", "gruplama", "sistem mimarisi", "API-first", "test"]
  concept: >
    TT Panel; veri modeli, API servisi, arayüz bileşeni, test yapısı ve erişim kontrolüyle donatılmış modüllerden oluşur.
    Modüller işlevsel gruplar hâlinde gruplanır (`commerce`, `system`, `automation`) ve gerektiğinde mikroservislere ayrılabilecek biçimde izole kurgulanır.

    Her modül:
    - Kendi veri modeli ve API-first servislerine sahiptir
    - Yetki kontrollü, erişim yönetimli ve i18n uyumlu çalışır
    - Mock veriler, test desteği ve frontend bileşenleriyle birlikte gelir
    - İzole ve taşınabilir olacak şekilde tasarlanır
    - Ortam dosyaları ve terminal komutlarıyla bütünleşik çalışır
  structure:
    commerce:
      title: "E-ticaret Modülleri"
      description: >
        - Ürün, sipariş, müşteri, kampanya, içerik ve raporlama bir araya gelerek entegre bir dijital mağaza altyapısı sunar.
        - Bu yapı, tüm e-ticaret sisteminin çekirdeğini oluşturur.
        - Her grup kendi içinde modülerdir; tüm yapı, mikroservis mimarisine uyarlanabilir şekilde tasarlanmıştır.
      groups:
        catalog:
          description: >
            Ürünlerin, kategorilerin, varyantların ve stokların yönetildiği alandır.
            - Katalog modülleri, ürünlerin sınıflandırılması, stok takibi, görsel ve fiyatlandırma gibi temel katalog yönetimi süreçlerini kapsar.
            - Tüm ticaret yapısının çekirdeğini oluşturur ve diğer gruplarla doğrudan ilişkilidir.
          modules:
            - name: product
              description: "Ürün tanımı, açıklama, fiyat, ilişki"
            - name: category
              description: "Hiyerarşik kategori yapısı, SEO, kampanya ilişkisi"
            - name: brand
              description: "Marka bilgisi, açıklama, logo"
            - name: supplier
              description: "Tedarikçi tanımları"
            - name: variant
              description: "Renk, beden gibi varyasyonlar"
            - name: stock
              description: "Stok sayısı, lokasyon, rezervasyon"
            - name: attribute
              description: "Özellik tanımları (örnek: materyal, ebat)"
            - name: unit
              description: "Ölçü birimi tanımları"
            - name: tag
              description: "Etiketleme sistemi"
            - name: collection
              description: "Koleksiyon yapıları"
            - name: price
              description: "Çoklu fiyat tanımları"
            - name: file
              description: "Ürün görselleri ve dosyaları"
            - name: barcode
              description: "Barkod eşlemeleri"
        order:
          description: >
            Sepet, ödeme, fatura ve kargo süreçlerini kapsar.
            - Sipariş yönetimi, faturalama, kargo ve iade gibi ticari işlemleri içerir.
            - E-ticaretin satış sonrası sürecini teknik olarak temsil eder.
          modules:
            - name: cart
              description: "Sepet sistemi (misafir + kayıtlı kullanıcı)"
            - name: order
              description: "Sipariş yönetimi"
            - name: payment
              description: "Ödeme yöntemleri ve adımları"
            - name: transaction
              description: "Ödeme sağlayıcı dönüşleri (örnek: iyzico)"
            - name: shipment
              description: "Kargo bilgileri"
            - name: invoice
              description: "Fatura oluşturma"
            - name: return
              description: "Ürün iade süreci"
            - name: note
              description: "Siparişe özel notlar"
            - name: status
              description: "Sipariş durumları"
            - name: history
              description: "Durum geçmişi ve işlem kayıtları"
        customer:
          description: >
            Üyelik, adres, yorum, puanlama gibi müşteri ile ilişkili modüllerdir.
            - Müşteriyle ilgili tüm veri ve işlemler bu grupta toplanır.
            - Kayıt, adres, geri bildirim, davranış analizi gibi kullanıcı ilişkileri bu modüller üzerinden yürütülür.
          modules:
            - name: customer
              description: "Üyelik ve profil bilgisi"
            - name: address
              description: "Teslimat ve fatura adresleri"
            - name: group
              description: "Müşteri grupları (B2B, bayi, kurumsal vs.)"
            - name: wishlist
              description: "Favori listeleri"
            - name: review
              description: "Ürün yorumları ve puanlamaları"
            - name: point
              description: "Puan/ödül sistemi"
            - name: consent
              description: "KVKK onay yönetimi"
            - name: contact
              description: "İletişim bilgileri"
            - name: login-history
              description: "Giriş logları"
            - name: customer-notification
              description: "Müşteriye özel bildirimler"
            - name: return-request
              description: "İade talepleri"
            - name: activity
              description: "Davranışsal veri logları (isteğe bağlı)"
        marketing:
          description: >
            Kampanya, kupon, analiz ve SEO gibi pazarlama modüllerini içerir.
            campaign, coupon, popup gibi modüller pazarlama içeriğini oluşturur.
            analytics, event, conversion gibi modüller ise pazarlama verilerini toplayarak GA4, Facebook Pixel ve CAPI gibi sistemlere veri gönderir, analiz işlemi yapmaz.
            Bu yapı, pazarlama etkisinin izlenebilirliğini artırmak için tetikleyici bir katman sağlar.
          modules:
            - name: campaign
              description: "Zamanlı kampanyalar"
            - name: coupon
              description: "Kupon kodları"
            - name: promotion
              description: "Anasayfa ve kategori promosyonları"
            - name: referral
              description: "Tavsiye sistemi"
            - name: seo
              description: "Sayfa bazlı SEO ayarları"
            - name: analytics
              description: "Görüntülenme, tıklama, dönüşüm takibi (GA4, Pixel vb.)"
            - name: event
              description: "Eylem tetikleyicileri (örn: sepete ekle, ödeme tamamla)"
            - name: utm
              description: "UTM parametre takibi (kaynak – medium – kampanya)"
            - name: conversion
              description: "Facebook CAPI ile dönüşüm verisi gönderimi"
            - name: merchant
              description: "Google Merchant Center ürün feed entegrasyonu"
            - name: banner
              description: "Kampanya görselleri"
            - name: popup
              description: "Ziyaretçi popup yönetimi"
        content:
          description: >
            TT Panel’deki tüm bilgi sunumu, sayfa içeriği ve görsel düzen modülleri bu grupta yer alır.
            - Sayfa, blog, slider, galeri ve içerik blokları gibi tüm görsel/kelimesel sunum modüllerini barındırır.
            - Arayüzde gösterilecek içerikleri API üzerinden sağlayan temel içerik kaynağıdır.
          modules:
            - name: page
              description: "Statik sayfalar (Hakkımızda, KVKK, İade Politikası)"
            - name: blog
              description: "Blog yazıları, arşiv, yazar"
            - name: faq
              description: "Sık sorulan sorular (kategori destekli)"
            - name: testimonial
              description: "Müşteri yorumları, referanslar"
            - name: reference
              description: "Görsel referanslar, siparişe bağlı galeri, konum ve ürün eşlemesi"
            - name: media
              description: "Ortak medya dosyaları (resim, belge, video)"
            - name: slider
              description: "Ana sayfa slayt alanları (görsel + başlık + buton)"
            - name: section
              description: "Sayfa düzeni blokları (özelleştirilebilir içerik)"
            - name: form
              description: "İletişim ve teklif formları"
            - name: video
              description: "YouTube, Vimeo gibi embed video alanları"
    system:
      title: "Sistem Modülleri"
      description: >
        Kullanıcı kimliği, erişim yetkisi, sistem davranışı ve yapılandırma bu gruptan yönetilir.
        - Erişim kontrolü, yapılandırma ayarları, bildirim ve loglama gibi sistemsel altyapı modüllerini içerir.
        - Tüm panel kullanıcılarının kimlik doğrulama, erişim izinleri ve sistem davranışları bu modüller üzerinden yönetilir.
      groups:
        access:
          description: >
            Kullanıcı kimliği, oturum yönetimi ve erişim kontrolü bu grupta tanımlanır.
            - Kullanıcı giriş-çıkış işlemleri, rol bazlı izinler ve token yönetimi gibi temel erişim süreçlerini kapsar.
            - Panel kullanıcılarının kimlik bilgileri ve erişim hakları bu modüllerle kontrol edilir.
          modules:
            - name: auth
              description: "Giriş, çıkış, şifre yenileme"
            - name: user
              description: "Kullanıcı profili ve ayarları"
            - name: role
              description: "Yetki rolleri"
            - name: permission
              description: "Rol bazlı izinler"
            - name: token
              description: "API ve session token yönetimi"
            - name: session
              description: "Oturum yönetimi (aktif oturumlar, son giriş)"
        config:
          description: >
            Panelin görünüm, dil, tema ve genel davranış ayarlarını barındırır.
            - Site ayarları, tema seçenekleri, dil desteği ve bakım modu gibi yapılandırma işlemlerini içerir.
            - Site sahibi veya geliştiriciye sistemin nasıl çalışacağını kontrol etme imkânı sağlar.
          modules:
            - name: settings
              description: "Site ayarları (isim, logo, para birimi vs.)"
            - name: theme
              description: "Tema seçenekleri (renk, dark/light)"
            - name: language
              description: "Dil seçenekleri"
            - name: config
              description: "Geliştiriciye özel sistem konfigürasyonları"
            - name: maintenance
              description: "Bakım modu, bakım ekranı"
            - name: timezone
              description: "Saat dilimi yönetimi (sistem, kullanıcı, tenant bazlı)"
            - name: currency
              description: "Para birimi tanımları ve dönüşüm oranları"
            - name: locale
              description: "Yerel ayarlar (tarih, sayı formatı)"
        notify:
          description: >
            Panel kullanıcılarına sistem bildirimleri, versiyon güncellemeleri ve duyurular bu modüllerle iletilir.
            - Sistem bildirimleri, duyurular ve sürüm geçmişi gibi bilgilendirme altyapısını oluşturur.
            - Kullanıcı bilgilendirme süreçlerini merkezileştirir ve sistem içi iletişimi sağlar.
          modules:
            - name: notification
              description: "Sistem bildirimleri"
            - name: announcement
              description: "Duyurular"
            - name: changelog
              description: "Sürüm geçmişi, yeni özellikler"
        log:
          description: >
            Panelde gerçekleşen sistemsel olayların kaydını tutar.
            - Hata ayıklama, denetim ve içsel izleme süreçlerinin temelini oluşturur.
            - Sistem olaylarının kaydı, güvenlik ve performans izleme açısından kritik öneme sahiptir.
          modules:
            - name: log
              description: "Sistemsel olay kayıtları"
            - name: activity-log
              description: "Panel kullanıcılarının gerçekleştirdiği işlemlerin kaydı (örneğin sipariş silme)"
        services:
          description: >
            Panelin dış sistemlerle veri alışverişini yöneten servis altyapısıdır.
            - Webhook yönetimi, API tüketimi ve veri sunumu gibi tüm entegrasyon kapıları bu modüller üzerinden çalışır.
            - Dış sistemlerle veri alışverişi ve tetikleyici yönetimi sağlar.
          modules:
            - name: webhook
              description: "Gelen/giden tetikleyici yönetimi"
            - name: api-client
              description: "Dış sistemlere veri gönderimi"
            - name: api-provider
              description: "Dış sistemlerden veri alımı"
            - name: ai-engine
              description: "Yapay zeka entegrasyonları (örneğin GPT/OpenAI)."
            - name: smtp
              description: "E-posta sunucu bağlantısı"
          saas:
            description: >
              TT Panel’in SaaS (Software as a Service) altyapısı, çoklu kiracı (multi-tenant) desteği ile yapılandırılır.
              - Her tenant için ayrı yapılandırma, veri izolasyonu ve özelleştirme imkânı sunar.
              - Bu modüller, TT Panel’in SaaS dönüşümüne uygun altyapısını oluşturur.
            modules:
              - name: tenant
                description: "Kiracı yönetimi (tenant bazlı yapılandırma)"
              - name: domain-mapping
                description: "Domain yönlendirme ve alt alan adı yönetimi"
              - name: plan-management
                description: "Abonelik planları ve yönetimi"
              - name: subscription
                description: "Kullanıcı abonelikleri ve ödeme yönetimi"
              - name: invitation
                description: "Kullanıcı davetleri ve yönetimi"
              - name: billing-usage
                description: "Kullanım bazlı faturalama ve abonelik yönetimi"
    automation:
      title: "Otomasyon Modülleri"
      description: >
        Tüm operasyonel süreçler, mesajlaşma, finansal işlemler ve entegrasyonlar bu grup altında 6 alt başlığa ayrılmıştır.
        - Operasyonel süreçler, müşteri etkileşimi, finansal işlemler, pazaryeri entegrasyonları, görev yönetimi ve kargo süreçlerini kapsar.
        - Bu modüller, TT Panel’in otomasyon ve entegrasyon yeteneklerini güçlendirir.
      groups:
        engagement:
          description: >
            Müşteri ile iletişim, destek ve etkileşim süreçlerini yöneten modüllerdir.
            - CRM, mesajlaşma platformları ve geri dönüş takip altyapısı entegre şekilde sunulur.
            - WhatsApp, Messenger, Instagram gibi kanallar merkezi bir mesaj kutusunda toplanabilir.
          modules:
