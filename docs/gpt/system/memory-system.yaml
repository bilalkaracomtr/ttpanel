habits:
  working_style: >
    Üretim sürecini sprint temelli, modül modül ilerletir.  
    Planlamayı önceler, ardından yapılandırma ve kodlama gelir.  
    GPT ile adım adım, iteratif bir geliştirme tarzını tercih eder.

  review_flow: >
    Her görev ve sprint sonunda üretilen dosya gözden geçirilir.  
    Gerekirse düzeltme, sadeleştirme ve tekrar yazım yapılır.  
    Kod kadar anlam ve organizasyona da önem verir.

  format_preference:
    - Markdown formatı
    - Kodlar mutlaka `code block` içinde
    - Tablolar sade markdown tablosu olarak
    - Dış format yalnızca açık istekle

  feedback_style:
    - Direktif verirken açık ve doğrudan yazar
    - Geri bildirim vermedikçe GPT devam edebilir
    - Fazla açıklama değil, doğrudan üretim beklenir

  tool_usage:
    - Terminal tabanlı üretim ve klasör düzeni
    - Genişletilmiş açıklamalar yerine kısa notlar tercih edilir
    - Önce yapı → sonra içerik → sonra kod mantığı benimsenir

notes:
  - Bu dosya, GPT’nin Bilal Kara ve Tasarım Teknesi hakkında bağlamsal bilgi sahibi olmasını sağlar.
  - GPT, tüm üretim eşliklerinde bu dosyadaki kimlik, yapı, tarz ve ihtiyaçları göz önünde bulundurmalıdır.
  - Tavsiye, yorum, öneri ve teknik karar süreçlerinde bu dosya referans kabul edilir.
  - `identity` ve `company` bölümleri sabittir; zamanla `habits` kısmı genişletilebilir.
  - Bu dosya `memory.yaml` ile birlikte okunur ancak onun yerine geçmez.
  - Üretim davranışları `gpt-identity.yaml`, sprint takibi `memory.yaml`, bağlam bilgisi bu dosya üzerinden yürütülür.
  - Bu dosyaya GPT tarafından içerik eklenmez; yalnızca kullanıcı güncellemesiyle değişir.
  - GPT yalnızca bu dosyadaki bilgiyi okur, yorumlar ve uygulamaya rehber olarak alır.