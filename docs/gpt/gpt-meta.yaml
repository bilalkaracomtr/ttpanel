            - name: ticket
              description: "Destek talepleri ve durum takibi"
            - name: follow-up
              description: "Geri dönüş planları, hatırlatıcılar"
            - name: insight
              description: "Müşteri etkileşim raporları"
            - name: message
              description: "Tüm mesajlaşma altyapısı (gelen kutusu)"
            - name: whatsapp
              description: "WhatsApp Business API bağlantısı"
            - name: messenger
              description: "Facebook Messenger entegrasyonu"
            - name: instagram
              description: "IG DM API bağlantısı"
            - name: sms
              description: "SMS servisleri (Netgsm, Twilio, vs.)"
        finance:
          description: >
            Fatura, kasa, banka, gider ve muhasebe işlemleri bu grupta yönetilir.
            - E-fatura altyapısı ve Mikro, Logo, Parasut gibi sistemlerle entegrasyon içerir.
            - Finansal süreçlerin uçtan uca takibi ve raporlanması için temel altyapıyı sunar.
          modules:
            - name: billing
              description: "Fatura kesimi ve fatura şablonları"
            - name: expense
              description: "Gider girişi ve kategorileştirme"
            - name: cash
              description: "Kasa takibi"
            - name: bank
              description: "Banka hareketleri"
            - name: accounting
              description: "Ön muhasebe genel modülü"
            - name: e-invoice
              description: "E-fatura API sistemi"
            - name: mikro
              description: "Mikro Yazılım entegrasyonu"
            - name: logo
              description: "Logo Tiger / Go entegrasyonu"
            - name: parasut
              description: "Parasut.io bağlantısı"
        marketplace:
          description: >
            Pazaryeri entegrasyonları, ürün ve sipariş verisinin dış platformlarla çift yönlü olarak senkronize edilmesini sağlar.
            - Amazon, Etsy gibi platformlara özel API modülleriyle stok takibi, sipariş yönetimi ve ürün yayını yapılabilir.
          modules:
            - name: amazon
              description: "Amazon satıcı hesabı ürün ve sipariş senkronizasyonu"
            - name: etsy
              description: "Etsy pazaryeri bağlantısı"
        operations:
          description: >
            İç operasyonları, görev yönetimini ve zaman bazlı süreçleri tanımlar.
            - Üretim planlaması, görev takibi, iş akışı otomasyonları ve takvim yönetimi entegre şekilde sunulur.
            - Özellikle ekip koordinasyonu ve üretim disiplinine yönelik altyapı sağlar.
          modules:
            - name: production
              description: "Üretim akışı, iş emirleri"
            - name: task
              description: "Görev atama, kullanıcı ilişkisi"
            - name: checklist
              description: "Göreve bağlı yapılacak adımlar"
            - name: workflow
              description: "Otomatik tetiklenen iş akışları"
            - name: schedule
              description: "Zaman bazlı planlama"
            - name: calendar
              description: "Takvim görünümü ve haftalık/yıllık mod"
            - name: reminder
              description: "Görev ve süreç bazlı hatırlatıcılar"
        shipping:
          description: >
            Siparişlerin kargo firmalarına aktarımı ve teslimat süreçlerinin takibini sağlar.
            - Kargo firmalarına özel API bağlantıları ve çoklu taşıyıcı altyapı içerir.
            - Kargo entegrasyonları, teslimat süreçlerini hızlandırır ve yönetimi kolaylaştırır.
          modules:
            - name: yurtici
              description: "Yurtiçi Kargo API entegrasyonu"
            - name: aras
              description: "Aras Kargo bağlantısı"
            - name: ship-integrator
              description: "Ship Entegrator çoklu taşıyıcı sistemi"
  notes:
    - "Her modül kendi `controller/`, `service/`, `dto/`, `entity/`, `test/` dizinine sahiptir"
    - "Raporlama için ayrı bir reporting/ grubu oluşturulmamıştır; her modül, kendi verisine dair metrikleri ve test endpoint’lerini içerecek şekilde genişletilir."
    - "İzleme, grafik ve performans verileri; `stats`, `metrics` gibi endpoint’lerle doğrudan ilgili modül içinde yer alır."
    - "Frontend raporlama arayüzleri admin panelde görsel olarak sunulur; backend tarafında ayrı bir raporlama modülüne gerek yoktur."
    - "Ortak yapılar `packages/` içinde paylaşılır"
    - "Frontend arayüzler i18n desteklidir"
    - "Her grup kendi panel menüsüne karşılık gelir"
    - "Mikroservis ayrımı grup bazlı yapılabilir"
    - "Modül üretimi backend + frontend (admin + shop) birlikte yürütülür. Her modülün tamamlanması; API, yönetim paneli ve müşteri arayüzünün entegre çalışabilir duruma gelmesini kapsar. `apps/mobile` yapısı opsiyonel olup, ilerleyen sürümlerde dahil edilebilir."
    - "Her modül birimdir. Her birim bağımsızdır. Ama hepsi birlikte sistemdir."
    - "Her modül, backend API, yönetim paneli arayüzü ve müşteri-facing frontend ile birlikte geliştirilir (API + admin + shop)"

tech:
  title: "Teknik Yapı ve Teknoloji Yığını"
  description: "Projenin teknoloji altyapısı, klasör düzeni, geliştirici araçları ve mimari tercihleri"
  category: "Teknik"
  tags: ["tech stack", "architecture", "testing", "env", "tooling"]

  purpose: >
    Modüler, sürdürülebilir ve test edilebilir bir yapı kurmak;
    takım içinde ortak bir teknik zemin oluşturmak ve mikroservis mimarisine zemin hazırlamak amacıyla planlanmıştır.

  stack:
    - layer: "Frontend"
      tools: ["Vue 3", "Nuxt 3", "Tailwind CSS"]
      level:
        - Vue: 🟠
        - Nuxt: 🟠
        - Tailwind: 🟠
    - layer: "Backend"
      tools: ["NestJS (TypeScript + Fastify)"]
      level:
        - JavaScript: 🟢
        - TypeScript/NestJS: 🟠
    - layer: "Veritabanı"
      tools: ["PostgreSQL"]
      level: ["SQL: 🟢"]
    - layer: "ORM"
      tools: ["Prisma"]
      level: ["🟠"]
    - layer: "Cache"
      tools: ["Redis"]
      level: ["🟠"]
    - layer: "Queue"
      tools: ["BullMQ + Redis"]
      level: ["🔴"]
    - layer: "Storage"
      tools: ["MinIO (S3 uyumlu)"]
      level: ["🔴"]
    - layer: "CI/CD"
      tools: ["GitHub Actions", "Docker Compose"]
      level:
        - GitHub Actions: 🟡
        - Docker: 🟢
    - layer: "Versiyonlama"
      tools: ["Git", "GitHub (dev/staging/prod)"]
      level: ["🟡"]
    - layer: "Ödeme"
      tools: ["Stripe", "Iyzico", "PayTR"]
      level: ["🔴"]
    - layer: "Test"
      tools: ["Vitest", "Supertest", "Cypress"]
      level: ["🟠"]
    - layer: "Monitoring"
      tools: ["Custom logging", "Stats endpoint", "Metrics API"]
      level: ["🟡"]

  learning_path:
  - "Vue 3 → Nuxt 3 → Tailwind CSS"
  - "TypeScript temeli → NestJS uygulama çatısı ve modül yapısı"
  - "Prisma + PostgreSQL ilişkileri (ORM ile veritabanı yönetimi)"
  - "JWT + bcrypt + session + guard + strategy (NestJS ile birlikte)"
  - "MinIO ile dosya yükleme"
  - "Redis + BullMQ → job/queue sistemi"
  - "Vitest, Supertest, Cypress ile test ortamı"
  - "CI süreçleri: GitHub Actions"
  - "Config dosyaları ile ortam yönetimi (.env, Makefile, docker-compose.yml)"
  - "API rate limit, brute force ve token yönetimi (auth güvenliği)"

  security:
    - "JWT tabanlı oturum ve erişim yönetimi"
    - "Rol ve izin bazlı yetkilendirme"
    - "CSRF, XSS, CORS korumaları"
    - "bcrypt ile veri şifreleme"
    - "Guard ve Strategy yapılarıyla erişim kontrolü"
    - "Refresh token ve session süresi planlaması"
    - "API rate limit & brute force protection"
    - "Loglama ve yetkisiz erişim takibi"

  testing:
    - "unit/: Birim testleri"
    - "integration/: Modüller arası veri testleri"
    - "e2e/: Uçtan uca senaryolar"
    - "CI/CD entegrasyonu ile test otomasyonu"
    - "Test kapsamı `coverage/` klasörü altında takip edilir, %60+ hedeflenir"

  config:
    - "docker/: Servis başlatma ve yapılandırma betikleri"
    - "env/: Ortam değişken şablonları (.env.example)"
    - "ssl/: Yerel geliştirme için SSL sertifikaları"
    - "system/: JSON/YAML sabit sistem konfigürasyonları"
    - "ci/: CI/CD betikleri (planlı alan)"

  tooling:
    - "scripts/: Otomasyon komutları"
    - "Makefile: CLI görevleri (örnek: make dev)"
    - ".env.example: Ortam kurulumu için şablon dosya"
    - "Husky ve lint-staged: commit öncesi test/lint kontrolleri"

  docs:
  - "manual/: Genel kullanım belgeleri"
  - "dev/: Teknik geliştirme dökümanları"
  - "gpt/: GPT destekli üretim dosyaları (gpt-meta.yaml, sessions.yaml, context.yaml)"
  - "guide/: Üretim rehberleri (örnek: copilot-guide.md, production-guide.md, vscode-setup-guide.md)"

  notes:
    - "Bu yapı, teknik üretim hafızasıdır; kod içermez, tüm planlama bilgisini taşır"
    - "Versiyon kontrolüne dahil edilmeli; yalnızca kişisel içerikler hariç tutulmalı"
    - "Geliştirme süreçleri bu dokümantasyona göre yürütülmelidir"

roadmap:
  title: "Üretim Yol Haritası"
  description: "TT Panel projesinin faz bazlı üretim sürecini, sprint yapılarını ve modül geliştirme dizilimini tanımlar. GPT destekli teknik üretim bu plana bağlı yürütülür."
  category: "Planlama"
  tags: ["roadmap", "sprint", "faz", "modül", "planlama", "yol haritası"]

  stage:
    phrase: "faz1"
    sprint: "sprint1"
    updated_at: "2025-07-22"

  purpose:
    description: >
      TT Panel’in yol haritası, modüler, test edilebilir ve sürdürülebilir üretim zihniyetinin teknik karşılığıdır.
      Yol haritası yalnızca görev sırası değil; üretim anlayışının kendisidir.
    items:
      - Modül bazlı üretim sürecini faz ve sprint mantığıyla planlamak
      - Hangi modülün ne zaman geliştirileceğini önceden tanımlamak
      - Sprint içeriklerini, hedeflerini ve iş yükünü önceden belirleyebilmek
      - Tüm üretim sürecini ortak ve senkronize bir anlayışla yürütmek
      - GPT destekli üretim senaryolarını bu yol haritasıyla hizalamak
      - Mevcut müşteri (Tasarım Teknesi) için altyapı oluşturmak
      - Uzun vadede TT Panel, çoklu müşteri (SaaS) modeline geçerek kiralanabilir bir iş modeline dönüşecektir.

  rationale: >
    TT Panel projesi, Tasarım Teknesi'nin Opencart altyapısından kaynaklı esneklik ve sürdürülebilirlik problemlerine çözüm üretmek amacıyla başlatılmıştır.
    Opencart, modern entegrasyonlara kapalı, özelleştirmeye uygun olmayan ve bakım yükü yüksek bir sistem haline gelmiştir.

    TT Panel, bu ihtiyaçlara cevap veren, modüler, API-first mimariye sahip ve uzun vadede SaaS'a dönüşebilecek bir yönetim altyapısı kurmayı hedefler.
    Projenin ilk fazı, Tasarım Teknesi’nin tüm operasyonel ihtiyaçlarını birebir karşılamaya odaklanır.
    İlerleyen fazlar, operasyonel verimlilik, etkileşim, analiz, muhasebe ve çoklu müşteri yapısı gibi özelliklerle sistemi olgunlaştıracaktır.

  planning_model:
    phase: >
      Benzer hedefe hizmet eden modüllerin bir araya getirildiği üretim bloklarıdır.
      Her faz bağımsız olarak yayına alınabilir; sprintleri ve modülleri içerir.
    sprint: >
      Her biri 7 gün süren, modül bazlı ve test edilebilirlik esasına dayalı haftalık üretim döngüleridir.
      Sprint bitiminde geliştirilen modüller API, admin ve shop olarak bütün halinde test edilir.
    module: >
      Her modül kendi içinde izole ve test edilebilir olacak şekilde API + admin + shop olarak birlikte geliştirilir.
      Sprint içinde tamamlanmayan modüller bir sonraki faza devredilir.

  principles:
    philosophical:
      - "Her işlevsel alan kendi modülü içinde geliştirilir. Modüller gruplar altında yönetilir."
      - "Her modülün test kapsamı sprint içerisinde tanımlanır. Vitest, Supertest, Cypress araçlarıyla test yapılır."
      - "Makefile, scripts ve Docker Compose ile terminal-first yaklaşım uygulanır."
      - "GPT yalnızca içerik değil, dosya, klasör, kod ve test üretimi yapar. Yol haritası tek bağlayıcı referanstır."
      - "İlk sürüm kuruma özel çözüm iken; yapı SaaS’a evrilebilir. Tenant, lisans, tema desteği içerir."
    technical:
      - "Her modül API, admin ve shop arayüzü ile birlikte, izole klasör yapısıyla geliştirilir."
      - "Sprint süresince yalnızca planlanan modüller geliştirilir; yeni iş alınmaz."
      - "Sprint sonunda test edilmeyen ya da eksik kalan modül bir sonraki sprintte değil, yeni fazda ele alınır."
      - "Yarım modüller yayınlanmaz; bütünlük esastır."
      - "Tamamlanan her modül GPT sistemine bildirilir ve yol haritası güncellenir."

  phases:
    - id: 1
      title: "Faz 1 – Temel E-Ticaret Altyapısı (MVP)"
      period: 2025-07-08 → 2025-09-01
      goal: >
        Sipariş alabilen, ödeme yapabilen, içerik gösterebilen ve sistem ayarlarını yönetebilen,
        mevcut Opencart altyapısını karşılayan yayınlanabilir ilk sürüm.
      modules:
        system/access: [auth, user, role, permission, token]
        system/config: [settings, language]
        system/log: [log, activity-log]
        system/services: [smtp]
        commerce/catalog:
          [
            product,
            category,
            brand,
            variant,
            stock,
            attribute,
            price,
            file,
            barcode,
          ]
        commerce/order:
          [
            cart,
            order,
            payment,
            transaction,
            shipment,
            invoice,
            status,
            history,
          ]
        commerce/customer: [customer, address, group, contact]
        commerce/content: [page, form, slider]
        commerce/marketing:
          [campaign, coupon, analytics, event, utm, conversion, merchant, seo]
            acceptance_criteria: # Faz Başarı ölçütleri
        - ...
        - ...
        - ...
      test-plan:
        - unit: "system/access modüllerinde servis ve validator fonksiyonları Vitest ile test edilir"
        - integration: "auth + user + token modülleri ilişkili olarak Supertest ile doğrulanır"
        - e2e: "kullanıcı girişi, rol atanması ve erişim yetkisi süreçleri Cypress ile test edilir"
      release_criteria:
        - "API tarafında tüm erişim modülleri testleriyle birlikte çalışıyor olmalı"
        - "Admin arayüzünde giriş, kullanıcı ve rol yönetimi sorunsuz işlemeli"
        - "Shop tarafında guest kullanıcı süreci bozulmamalı (henüz login yoksa bile)"
        - ".env ve docker-compose ile tüm sistem `make up` ile ayağa kalkmalı"
        - "GitHub repoda temel sürüm etiketi tanımlanmalı (örn: v1.0.0)"
      sprints:
        duration: 7 days
        list:
          - id: 1
            title: "Faz 1 – Sprint 1 – Kurulum & Erişim Temeli"
            period: "2025-07-21 → 2025-07-27"
            started_at: "2025-07-23"
            completed_at: null
            goal: "Temel e-ticaret altyapısının ilk modüllerini geliştirmek."
            modules:
                - system/access/auth
                - system/access/user
                - system/access/role
                - system/access/permission
                - system/access/token
            tasks:
              # 🏷️ İlk Versiyonlama
              - version_tag: İlk Git etiketi `v0.0.0` olarak repo'ya eklenecek (`git tag v0.0.0`)

              # 🐳 Docker & Ortam Kurulumu
              - docker_env_setup: Ortam yapılandırma dosyaları oluşturulacak (`.env.api`, `.env.admin`, `.env.shop`, `.env.postgres`, `.env.redis`, `.env.mailpit`, `.env.minio`)
              - docker_compose_up: Tüm servisler başlatılacak (`make up`)
              - docker_pgweb_check: PostgreSQL yönetim paneli (`pgweb.ttpanel.test`) erişim kontrolü yapılacak

              # 🧩 Prisma ORM
              - prisma_init: `Prisma` kurulumu ve `schema.prisma` başlatılması
              - prisma_migrate: İlk `prisma migrate` işlemi yapılacak (`make migrate`)
              - prisma_seed: Temel kullanıcı, rol ve izin verileri için `prisma/seed.ts` dosyası oluşturulacak ve çalıştırılacak (`make seed`)

              # 🚀 Uygulama Bootstrap
              - api_bootstrap: `apps/api` klasöründe NestJS projesi oluşturulacak (`npx @nestjs/cli new api`)
              - admin_bootstrap: `apps/admin` klasöründe Nuxt 3 projesi başlatılacak (`npx nuxi init`)
              - shop_bootstrap: `apps/shop` klasöründe Nuxt 3 (customer-facing) arayüz başlatılacak

              # 🧱 Ortak UI Bileşenleri
              - packages_ui: `packages/ui` klasöründe `BaseInput`, `BaseButton`, `LayoutDefault` gibi temel Vue bileşenleri oluşturulacak

              # ⚙️ Makefile ve CLI
              - makefile_init: `makefile` içeriği gözden geçirilecek, `up`, `down`, `logs`, `seed`, `psql`, `migrate` gibi komutlar aktif hâle getirilecek

              # 🧪 Test Altyapısı
              - vitest_setup: `api` dizininde `Vitest` kurulumu yapılacak, `test/` klasörü başlatılacak
              - supertest_setup: NestJS testleri için `Supertest` kurulumu yapılacak ve test örneği yazılacak
              - cypress_setup: `admin` dizininde `Cypress` kurulumu yapılacak, `e2e` test klasörü oluşturulacak

              # 🏷️ Versiyonlama
