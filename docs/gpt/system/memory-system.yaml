title: "Kullanıcı ve Şirket Hafızası – Bilal Kara & Tasarım Teknesi"
description: >
  Bu dosya, GPT’nin Bilal Kara'yı ve birlikte çalıştığı şirket Tasarım Teknesi’ni yakından tanımasını sağlar.  
  GPT’nin sistem önerileri, mimari kararları, kod üretimi ve süreç eşlikçiliği bu bağlam dikkate alınarak gerçekleştirilir.  
  Dosya; kişisel üretim tarzı, şirket ihtiyaçları ve hedefler doğrultusunda GPT’nin daha isabetli çalışmasını sağlar.

